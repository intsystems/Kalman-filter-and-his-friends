<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0d1321"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ee4c2c"/>
      <stop offset="100%" style="stop-color:#ff8c42"/>
    </linearGradient>
    <linearGradient id="ellipseGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ee4c2c;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ee4c2c;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="ellipseGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="ellipseGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ee4c2c;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#ee4c2c;stop-opacity:1"/>
      <stop offset="85%" style="stop-color:#ff8c42;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff8c42;stop-opacity:0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" fill="url(#grid)" opacity="0.5"/>
  <rect width="1200" height="400" filter="url(#noise)"/>

  <!-- Decorative coordinate axes (subtle) -->
  <line x1="60" y1="340" x2="400" y2="340" stroke="#334155" stroke-width="1"/>
  <line x1="60" y1="340" x2="60" y2="80" stroke="#334155" stroke-width="1"/>
  <!-- Axis ticks -->
  <line x1="100" y1="340" x2="100" y2="345" stroke="#334155" stroke-width="0.8"/>
  <line x1="140" y1="340" x2="140" y2="345" stroke="#334155" stroke-width="0.8"/>
  <line x1="180" y1="340" x2="180" y2="345" stroke="#334155" stroke-width="0.8"/>
  <line x1="220" y1="340" x2="220" y2="345" stroke="#334155" stroke-width="0.8"/>
  <line x1="260" y1="340" x2="260" y2="345" stroke="#334155" stroke-width="0.8"/>
  <line x1="300" y1="340" x2="300" y2="345" stroke="#334155" stroke-width="0.8"/>
  <line x1="340" y1="340" x2="340" y2="345" stroke="#334155" stroke-width="0.8"/>

  <!-- Uncertainty ellipses (Kalman filter covariance visualization) -->
  <!-- Large background ellipse -->
  <ellipse cx="260" cy="220" rx="140" ry="90" fill="url(#ellipseGrad2)" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.5" transform="rotate(-15, 260, 220)"/>
  <!-- Medium ellipse (prediction) -->
  <ellipse cx="280" cy="210" rx="95" ry="55" fill="url(#ellipseGrad1)" stroke="#ee4c2c" stroke-width="1.4" stroke-opacity="0.7" transform="rotate(-20, 280, 210)"/>
  <!-- Small ellipse (updated/posterior) -->
  <ellipse cx="290" cy="200" rx="50" ry="30" fill="url(#ellipseGrad3)" stroke="#10b981" stroke-width="1.8" stroke-opacity="0.8" transform="rotate(-20, 290, 200)"/>

  <!-- True trajectory (dashed) -->
  <path d="M 80 300 Q 130 260 170 250 Q 210 240 250 220 Q 290 200 330 190 Q 370 180 400 160" 
        fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.85"/>

  <!-- Measurement points (noisy observations) -->
  <circle cx="95" cy="310" r="3.5" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity="0.85"/>
  <circle cx="145" cy="240" r="3.5" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity="0.85"/>
  <circle cx="175" cy="265" r="3.5" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity="0.85"/>
  <circle cx="230" cy="230" r="3.5" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity="0.85"/>
  <circle cx="265" cy="195" r="3.5" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity="0.85"/>
  <circle cx="310" cy="205" r="3.5" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity="0.85"/>
  <circle cx="350" cy="170" r="3.5" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity="0.85"/>
  <circle cx="385" cy="175" r="3.5" fill="none" stroke="#fbbf24" stroke-width="1.8" opacity="0.85"/>

  <!-- Kalman filtered trajectory (smooth, glowing) -->
  <path d="M 90 305 Q 130 255 170 248 Q 220 232 260 215 Q 300 198 340 185 Q 370 175 395 163" 
        fill="none" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- State estimate dots on filtered path -->
  <circle cx="90" cy="305" r="3" fill="#ee4c2c" filter="url(#glow)"/>
  <circle cx="170" cy="248" r="3" fill="#ee4c2c" filter="url(#glow)"/>
  <circle cx="260" cy="215" r="3" fill="#ee4c2c" filter="url(#glow)"/>
  <circle cx="340" cy="185" r="3" fill="#ee4c2c" filter="url(#glow)"/>
  <circle cx="395" cy="163" r="3" fill="#ee4c2c" filter="url(#glow)"/>

  <!-- Mini covariance ellipses at estimate points -->
  <ellipse cx="170" cy="248" rx="18" ry="11" fill="none" stroke="#ee4c2c" stroke-width="1" stroke-opacity="0.6" transform="rotate(-15, 170, 248)"/>
  <ellipse cx="260" cy="215" rx="14" ry="8" fill="none" stroke="#ee4c2c" stroke-width="1" stroke-opacity="0.6" transform="rotate(-18, 260, 215)"/>
  <ellipse cx="340" cy="185" rx="10" ry="6" fill="none" stroke="#ee4c2c" stroke-width="1" stroke-opacity="0.6" transform="rotate(-12, 340, 185)"/>

  <!-- Decorative matrix/equation elements (right side) -->
  <g opacity="0.55" transform="translate(870, 290)">
    <text font-family="'Courier New', monospace" font-size="12" fill="#cbd5e1">
      <tspan x="0" dy="0">xŐā‚āĖ = F‚āĖxŐā‚āĖ‚āč‚āĀ + B‚āĖu‚āĖ</tspan>
      <tspan x="0" dy="20">P‚āĖ = F‚āĖP‚āĖ‚āč‚āĀF‚āĖŠĶÄ + Q‚āĖ</tspan>
      <tspan x="0" dy="20">K‚āĖ = P‚āĖH‚āĖŠĶÄ(H‚āĖP‚āĖH‚āĖŠĶÄ+R‚āĖ)‚ĀĽ¬Ļ</tspan>
    </text>
  </g>

  <!-- Decorative floating particles -->
  <circle cx="450" cy="120" r="1.5" fill="#3b82f6" opacity="0.4"/>
  <circle cx="520" cy="80" r="1" fill="#ee4c2c" opacity="0.3"/>
  <circle cx="680" cy="350" r="1.5" fill="#10b981" opacity="0.3"/>
  <circle cx="900" cy="100" r="1" fill="#f59e0b" opacity="0.3"/>
  <circle cx="1050" cy="320" r="1.5" fill="#3b82f6" opacity="0.25"/>
  <circle cx="1150" cy="140" r="1" fill="#ee4c2c" opacity="0.3"/>
  <circle cx="780" cy="60" r="1.2" fill="#10b981" opacity="0.25"/>

  <!-- Accent line separator -->
  <rect x="480" y="195" width="660" height="2" rx="1" fill="url(#lineGrad)" opacity="0.6"/>

  <!-- Main title -->
  <text x="600" y="168" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="46" font-weight="bold" fill="#f1f5f9" letter-spacing="1">
    Kalman Filter
  </text>
  <text x="600" y="168" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="46" font-weight="bold" fill="#f1f5f9" letter-spacing="1" filter="url(#softGlow)" opacity="0.3">
    Kalman Filter
  </text>

  <!-- Subtitle -->
  <text x="600" y="225" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="30" fill="#cbd5e1" font-style="italic" letter-spacing="3">
    &amp; His Friends
  </text>

  <!-- PyTorch badge -->
  <g transform="translate(540, 260)">
    <rect x="0" y="0" width="120" height="30" rx="15" fill="none" stroke="#ee4c2c" stroke-width="1.4" opacity="0.85"/>
    <!-- PyTorch official logo icon -->
    <g transform="translate(14, 5) scale(0.83)">
      <path d="M12.005.04l-7.03 7.03a9.832 9.832 0 0 0 0 13.975 9.833 9.833 0 0 0 13.976 0c3.97-3.887 3.972-10.171.084-13.976l-1.738 1.737c2.895 2.895 2.895 7.608 0 10.503-2.894 2.894-7.608 2.894-10.503 0C3.9 16.414 3.9 11.7 6.794 8.806l4.632-4.631.58-.663zm3.556 3.886a1.323 1.323 0 0 0-1.323 1.323 1.323 1.323 0 0 0 1.323 1.323 1.323 1.323 0 0 0 1.323-1.323 1.323 1.323 0 0 0-1.323-1.323z" 
            fill="#ee4c2c"/>
    </g>
    <text x="68" y="20" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#ff6b4a" letter-spacing="1">
      PyTorch
    </text>
  </g>

  <!-- Tags -->
  <g transform="translate(388, 310)">
    <rect x="0" y="0" width="65" height="26" rx="13" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="32" y="17" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#e2e8f0">KF</text>
  </g>
  <g transform="translate(463, 310)">
    <rect x="0" y="0" width="65" height="26" rx="13" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="32" y="17" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#e2e8f0">EKF</text>
  </g>
  <g transform="translate(538, 310)">
    <rect x="0" y="0" width="65" height="26" rx="13" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="32" y="17" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#e2e8f0">UKF</text>
  </g>
  <g transform="translate(613, 310)">
    <rect x="0" y="0" width="85" height="26" rx="13" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="42" y="17" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#e2e8f0">VB-AKF</text>
  </g>
  <g transform="translate(708, 310)">
    <rect x="0" y="0" width="65" height="26" rx="13" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="32" y="17" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#e2e8f0">DKF</text>
  </g>

  <!-- Legend (bottom-left) -->
  <g transform="translate(75, 360)" opacity="1">
    <line x1="0" y1="5" x2="20" y2="5" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="26" y="9" font-family="'Courier New', monospace" font-size="9" fill="#94a3b8">true</text>
    <circle cx="90" cy="5" r="3" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="98" y="9" font-family="'Courier New', monospace" font-size="9" fill="#94a3b8">obs</text>
    <line x1="145" y1="5" x2="165" y2="5" stroke="#ee4c2c" stroke-width="2"/>
    <text x="171" y="9" font-family="'Courier New', monospace" font-size="9" fill="#94a3b8">estimate</text>
  </g>

  <!-- Subtle border -->
  <rect x="0" y="0" width="1200" height="400" fill="none" stroke="#1e293b" stroke-width="2"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accentGrad)" opacity="0.5"/>
</svg>